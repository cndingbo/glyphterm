name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.78"
      - uses: Swatinem/rust-cache@v2
      - name: Test workspace
        run: cargo test --workspace --all-targets
      - name: Check CLI builds
        run: cargo build -p glyphterm-cli --release
