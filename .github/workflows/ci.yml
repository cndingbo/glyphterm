name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    # Self-hosted on your Mac (labels from scripts/setup-self-hosted-runner.sh)
    runs-on: [self-hosted, macOS, glyphterm]
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Rust toolchain
        run: |
          if ! command -v cargo >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source "$HOME/.cargo/env"
          fi
          rustup default stable
          rustc --version
          cargo --version

      - uses: Swatinem/rust-cache@v2

      - name: Test core crates
        run: cargo test -p glyphwidth -p glyphgrid -p glyphvt -p glyphterm-core -p glyphterm-cli

      - name: Build CLI (release)
        run: cargo build -p glyphterm-cli --release

      - name: Build Tauri backend
        run: cargo build -p glyphterm-desktop --manifest-path apps/glyphterm-desktop/src-tauri/Cargo.toml
