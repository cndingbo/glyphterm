<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlyphTerm</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main id="app">
      <header class="titlebar">
        <span class="logo">GlyphTerm</span>
        <span class="hint">字形终端 · CJK-first</span>
        <div class="titlebar-actions">
          <button type="button" id="btn-new-local" class="btn-sm" title="新标签 (⌘T)">+ 本地</button>
          <button type="button" id="btn-new-ssh" class="btn-sm" title="SSH (⌘⇧N)">+ SSH</button>
        </div>
      </header>
      <nav id="tab-bar" class="tab-bar" aria-label="终端标签"></nav>
      <p id="font-banner" class="font-banner" hidden></p>
      <div id="terminal-wrap">
        <canvas id="terminal" tabindex="0"></canvas>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
