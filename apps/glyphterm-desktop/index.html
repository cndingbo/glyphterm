<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlyphTerm</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <link rel="stylesheet" href="/src/workspace/workspace.css" />
  </head>
  <body>
    <main id="app">
      <header class="titlebar">
        <div class="brand">
          <span class="brand-mark" data-i18n="app.brandMark" aria-hidden="true">G</span>
          <span class="logo">GlyphTerm</span>
        </div>
        <span class="hint" data-i18n="app.hint">CJK-first terminal · Workspace</span>
        <div class="titlebar-spacer"></div>
        <div class="titlebar-actions ui-mode-toggle">
          <label for="ui-locale" data-i18n="settings.language">Language</label>
          <select id="ui-locale" title="English / 简体中文"></select>
          <label for="ui-mode" data-i18n="settings.uiMode">Layout</label>
          <select id="ui-mode" data-i18n-title="settings.uiModeTitle" title="Classic or workspace">
            <option value="workspace" data-i18n-option="uiMode.workspace">Workspace</option>
            <option value="classic" data-i18n-option="uiMode.classic">Classic</option>
          </select>
          <div class="theme-picker">
            <label for="theme-select-ws" data-i18n="settings.theme">Theme</label>
            <select id="theme-select-ws" data-i18n-title="settings.themeTitle" title="Color theme"></select>
          </div>
          <span id="workspace-titlebar-actions" class="workspace-titlebar-actions">
            <button type="button" id="btn-ws-new-local" class="btn-sm" data-i18n="actions.newLocal" data-i18n-title="actions.newLocalTitle">+ Local</button>
            <button type="button" id="btn-ws-new-ssh" class="btn-sm" data-i18n="actions.newSsh" data-i18n-title="actions.newSshTitle">+ SSH</button>
          </span>
          <span id="classic-titlebar-actions" class="classic-titlebar-actions" hidden>
            <button type="button" id="btn-new-local" class="btn-sm" data-i18n="actions.newLocal" data-i18n-title="actions.newLocalTitle">+ Local</button>
            <button type="button" id="btn-new-ssh" class="btn-sm" data-i18n="actions.newSsh" data-i18n-title="actions.newSshTitle">+ SSH</button>
            <select id="theme-select" hidden></select>
          </span>
        </div>
      </header>

      <div id="workspace-shell" class="workspace-shell" hidden>
        <div class="workspace-top">
          <nav id="ws-tab-bar" class="ws-tab-bar" data-i18n-aria="a11y.workspaceTabs" aria-label="Workspace tabs"></nav>
          <button type="button" id="btn-ws-tab-add" class="ws-tab-add" data-i18n-title="actions.newWorkspaceTab" title="New workspace tab">+</button>
          <button type="button" id="btn-split-h" class="btn-icon" data-i18n-title="actions.splitLayout" title="Split layout">⊞</button>
          <span id="workspace-path" class="workspace-path"></span>
        </div>
        <div class="workspace-body">
          <nav id="activity-rail" class="activity-rail" data-i18n-aria="a11y.activityBar" aria-label="Activity bar"></nav>
          <aside id="side-panel" class="side-panel" hidden>
            <div id="side-panel-content"></div>
          </aside>
          <section id="workspace-stage" class="workspace-stage"></section>
        </div>
      </div>

      <div id="classic-shell" hidden>
        <nav id="tab-bar" class="tab-bar" data-i18n-aria="a11y.terminalTabs" aria-label="Terminal tabs"></nav>
        <p id="font-banner" class="font-banner" hidden></p>
        <div id="terminal-wrap">
          <canvas id="terminal" tabindex="0"></canvas>
        </div>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
